- name: Install nginx and openssl
  ansible.builtin.package:
    name:
      - nginx
      - openssl
    state: latest

- name: Ensure nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Ensure certs directory exists
  ansible.builtin.file:
    path: /etc/nginx/certs
    state: directory
    mode: "0755"

- name: Generate self-signed certificate
  ansible.builtin.command:
    cmd: >
      openssl req -x509 -nodes -days 365
      -newkey rsa:2048
      -keyout /etc/nginx/certs/default.key
      -out /etc/nginx/certs/default.crt
      -subj "/CN=localhost"
    creates: /etc/nginx/certs/default.crt

# --- Validate before deploying ---

- name: Sync nginx config to staging directory for validation
  ansible.builtin.synchronize:
    src: "{{ role_path }}/files/nginx/"
    dest: /etc/nginx-staging/
    delete: true
    recursive: true
    owner: true
    group: true
    rsync_opts:
      - "--exclude=certs"

- name: Validate staged nginx config
  ansible.builtin.command:
    cmd: nginx -t -c /etc/nginx-staging/nginx.conf
  register: nginx_validate
  changed_when: false
  failed_when: nginx_validate.rc != 0

- name: Clean up staging directory
  ansible.builtin.file:
    path: /etc/nginx-staging
    state: absent

# --- Deploy only if valid ---

- name: Sync nginx config directory
  ansible.builtin.synchronize:
    src: "{{ role_path }}/files/nginx/"
    dest: /etc/nginx/
    delete: true
    recursive: true
    owner: true
    group: true
    rsync_opts:
      - "--exclude=certs"
  notify: Reload nginx

