---
- name: Update package cache and upgrade packages
  hosts: all
  become: true

  tasks:
    - name: Upgrade all packages (Debian)
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
      when: ansible_os_family == "Debian"

    - name: Upgrade all packages (RedHat)
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"

- name: Install and config nginx
  hosts: webservers
  become: true

  tasks:
    - name: Install dependencies
      ansible.builtin.package:
        name:
          - nginx
          - openssl

    - name: Ensure certs directory exists
      ansible.builtin.file:
        path: /etc/nginx/certs
        state: directory
        mode: "0755"

    - name: Generate self-signed certificate
      ansible.builtin.command:
        cmd: >
          openssl req -x509 -nodes -days 365
          -newkey rsa:2048
          -keyout /etc/nginx/certs/default.key
          -out /etc/nginx/certs/default.crt
          -subj "/CN=localhost"
        creates: /etc/nginx/certs/default.crt

    - name: Sync nginx config directory
      ansible.builtin.synchronize:
        src: nginx
        dest: /etc/nginx/
        delete: true
        recursive: true
        owner: true
        group: true
        rsync_opts:
          - "--exclude=certs"
      notify: Reload nginx

    - name: Ensure nginx is started and enabled
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

- name: Deploy the target
  hosts: webservers
  vars:
    repo_url: "https://github.com/FaridG7/dummy-website.git"
    repo_branch: "master"
    deploy_dir: "/var/www/html/dummy-website"
    web_user: "www-data"

  tasks:
    - name: Install dependencies
      become: true
      ansible.builtin.package:
        name:
          - git
          - acl

    - name: Ensure deploy directory exists and is owned by web user
      become: true
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        owner: "{{ web_user }}"
        group: "{{ web_user }}"
        mode: "0755"

    - name: Pull latest code from repo
      become: true
      become_user: "{{ web_user }}"
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ deploy_dir }}"
        version: "{{ repo_branch }}"
        update: true
        clone: true

    - name: Set correct file permissions
      become: true
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        owner: "{{ web_user }}"
        group: "{{ web_user }}"
        recurse: true
